included:
  - secant/Sources/

excluded:
  - xctemplates
  - secantTests
  - secantUITests
  - secant/Sources/**/*Test.swift
  - secant/Sources/**/*TestKey.swift

disabled_rules:
  - notification_center_detachment
  - orphaned_doc_comment
  - todo
  - nesting
  - multiple_closures_with_trailing_closure
  - generic_type_name
  - redundant_void_return
  - empty_parentheses_with_trailing_closure
  - identifier_name
  - implicit_optional_initialization
  - function_body_length
  - file_length
  - type_body_length
  - cyclomatic_complexity
  - function_parameter_count
  - large_tuple
  - for_where
  - redundant_discardable_let
  - comment_spacing
  - type_name

opt_in_rules:
  - mark
  - array_init
  - async_without_await
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - colon
  - comma_inheritance
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - convenience_type
  - discouraged_object_literal
  - empty_collection_literal
  - empty_count
  - empty_string
  - fatal_error_message
  - first_where
  - force_unwrapping
  - implicitly_unwrapped_optional
  - identical_operands
  - last_where
  - legacy_random
  - literal_expression_end_indentation
  - multiline_arguments
  - multiline_arguments_brackets
  - multiline_function_chains
  - multiline_literal_brackets
  - multiline_parameters
  - multiline_parameters_brackets
  - operator_usage_whitespace
  - overridden_super_call
  - pattern_matching_keywords
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - redundant_type_annotation
  - return_arrow_whitespace
  - strict_fileprivate
  - unhandled_throwing_task
  - unneeded_escaping
  - unneeded_parentheses_in_closure_argument
  - vertical_whitespace_closing_braces
  - weak_delegate
  - yoda_condition

analyzer_rules:
  - unused_import

custom_rules:
  array_constructor:
    name: "Array/Dictionary initializer"
    regex: '[let,var] .+ = (\[.+\]\(\))'
    capture_group: 1
    message: "Use explicit type annotation when initializing empty arrays and dictionaries"
    severity: warning

  print_function_usage:
    included: ".*\\.swift"
    excluded: ".*Test\\.swift"
    name: "Swift print() or debugPrint() should not be used in App Code"
    regex: "print\\(|debugPrint\\("
    message: "The Swift print() or debugPrint() functions should not be used."
    severity: warning

  nslog_function_usage:
    included: ".*\\.swift"
    excluded: ".*Test\\.swift"
    name: "Swift NSLog() should not be used in App Code"
    regex: "NSLog\\("
    message: "The swift NSLog function should not be used."
    severity: error

  explicit_type_init:
    included: ".*\\.swift"
    name: "Explicit Type Init"
    regex: '(?<!super)(?<!self)\.init\('
    message: "Use TypeName() instead of .init() or Self.init()"
    severity: error

force_cast: error
force_try: error

legacy_hashing: error

line_length:
  warning: 150
  error: 150
  ignores_urls: true
  ignores_function_declarations: true
  ignores_comments: true

multiline_arguments:
  first_argument_location: next_line
  only_enforce_after_first_closure_on_first_line: true

private_over_fileprivate:
  validate_extensions: true

trailing_whitespace:
  ignores_empty_lines: true
  ignores_comments: true

vertical_whitespace:
  max_empty_lines: 1

empty_count: warning
